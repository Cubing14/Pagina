<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrusel de Imágenes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="view-buttons">
        <button class="view-btn active" onclick="changeView('carousel')">Carrusel</button>
        <button class="view-btn" onclick="changeView('grid')">Cuadrícula</button>
        <button class="view-btn" onclick="changeView('list')">Lista</button>
    </div>
    
    <div class="carousel-container">
        <div class="carousel">
            <button class="carousel-btn prev" onclick="moveSlide(-1)">&#10094;</button>
            
            <div class="carousel-slides">
                <div class="slide active" data-img="https://picsum.photos/800/400?random=1">
                    <img src="https://picsum.photos/800/400?random=1" alt="Imagen 1">
                </div>
                <div class="slide" data-img="https://picsum.photos/800/400?random=2">
                    <img src="https://picsum.photos/800/400?random=2" alt="Imagen 2">
                </div>
                <div class="slide" data-img="https://picsum.photos/800/400?random=3">
                    <img src="https://picsum.photos/800/400?random=3" alt="Imagen 3">
                </div>
                <div class="slide" data-img="https://picsum.photos/800/400?random=4">
                    <img src="https://picsum.photos/800/400?random=4" alt="Imagen 4">
                </div>
            </div>
            
            <button class="carousel-btn next" onclick="moveSlide(1)">&#10095;</button>
        </div>
        
        <div class="carousel-dots">
            <span class="dot active" onclick="currentSlide(0)"></span>
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
